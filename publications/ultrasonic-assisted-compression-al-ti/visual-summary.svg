<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Aluminium and titanium respond differently to ultrasound</title>
  <desc id="desc">Aluminum and titanium share instantaneous ultrasonic softening but develop different residual effects through grain refinement, recrystallization, and deformation twinning.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="context-stroke"/>
    </marker>
    <style>
      text { font-family: Arial, "Noto Sans SC", "Microsoft YaHei", sans-serif; letter-spacing: 0; }
      .kicker { font-size: 16px; font-weight: 700; }
      .title { font-size: 29px; font-weight: 750; fill: #17231f; }
      .panel-title { font-size: 18px; font-weight: 700; }
      .label { font-size: 18px; fill: #17231f; }
      .small { font-size: 15px; fill: #60706a; }
      .micro { font-size: 13px; fill: #60706a; }
      .strong { font-weight: 700; }
      .metric { font-size: 27px; font-weight: 750; fill: #174a3a; }
    </style>
  </defs>
  <rect width="1200" height="675" fill="#f4f8f6"/>
  <rect x="26" y="26" width="1148" height="623" rx="8" fill="#ffffff" stroke="#cfdad6" stroke-width="2"/>
  <text x="56" y="62" class-="kicker" fill="#16827c">COMPARATIVE ULTRASONIC-ASSISTED COMPRESSION</text>
  <text x="56" y="103" class-="title"><tspan x="56" dy="0">Aluminium and titanium respond differently to ultrasound</tspan></text>
  <line x1="56" y1="142" x2="1144" y2="142" stroke="#cfdad6" stroke-width="2"/>
  <g transform="translate(0 0)"><rect x="55" y="205" width="235" height="330" fill="#ffffff" stroke="#cfdad6" rx="6" stroke-width="2"/><text x="77" y="239" class-="panel-title" fill="#d99a32">ALUMINIUM</text><rect x="100" y="273" width="145" height="22" fill="#81939b" stroke="#81939b" rx="2" stroke-width="0"/><rect x="138" y="297" width="69" height="136" fill="#d99a32" stroke="#17231f" rx="4" stroke-width="2"/><rect x="100" y="435" width="145" height="22" fill="#81939b" stroke="#81939b" rx="2" stroke-width="0"/><line x1="172" y1="257" x2="172" y2="283" stroke="#cc624f" stroke-width="5" marker-end="url(#arrow)"/><path d="M 110 365 q 15 -18 30 0 t 30 0 t 30 0 t 30 0" fill="none" stroke="#d99a32" stroke-width="4"/><rect x="90" y="479" width="165" height="38" fill="#f4f8f6" stroke="none" rx="19" stroke-width="0"/><text x="172.5" y="505" class-="small strong" text-anchor="middle" fill="#d99a32">RESIDUAL HARDENING</text><rect x="325" y="205" width="235" height="330" fill="#ffffff" stroke="#cfdad6" rx="6" stroke-width="2"/><text x="347" y="239" class-="panel-title" fill="#367f9d">TITANIUM</text><rect x="370" y="273" width="145" height="22" fill="#81939b" stroke="#81939b" rx="2" stroke-width="0"/><rect x="408" y="297" width="69" height="136" fill="#367f9d" stroke="#17231f" rx="4" stroke-width="2"/><rect x="370" y="435" width="145" height="22" fill="#81939b" stroke="#81939b" rx="2" stroke-width="0"/><line x1="442" y1="257" x2="442" y2="283" stroke="#cc624f" stroke-width="5" marker-end="url(#arrow)"/><path d="M 380 365 q 15 -18 30 0 t 30 0 t 30 0 t 30 0" fill="none" stroke="#d99a32" stroke-width="4"/><rect x="360" y="479" width="165" height="38" fill="#f4f8f6" stroke="none" rx="19" stroke-width="0"/><text x="442.5" y="505" class-="small strong" text-anchor="middle" fill="#367f9d">SOFTENING AT HIGH A</text><line x1="585" y1="370" x2="650" y2="370" stroke="#60706a" stroke-width="4" marker-end="url(#arrow)"/><rect x="670" y="185" width="475" height="380" fill="#ffffff" stroke="#cfdad6" rx="6" stroke-width="2"/><rect x="670" y="185" width="8" height="380" fill="#174a3a" stroke="#174a3a" rx="4" stroke-width="0"/><text x="696" y="219" class-="panel-title" fill="#174a3a">MICROSTRUCTURAL PATHWAYS</text><circle cx="780" cy="320" r="68" fill="#ffffff" stroke="#17231f" stroke-width="3"/><polygon points="780,320 716,308 760,257" fill="#f4d69e" stroke="#ffffff" stroke-width="2"/><polygon points="780,320 760,257 815,260" fill="#dfad5c" stroke="#ffffff" stroke-width="2"/><polygon points="780,320 815,260 844,325" fill="#d8eee8" stroke="#ffffff" stroke-width="2"/><polygon points="780,320 844,325 800,383" fill="#9ed2c8" stroke="#ffffff" stroke-width="2"/><polygon points="780,320 800,383 744,380" fill="#f4d69e" stroke="#ffffff" stroke-width="2"/><polygon points="780,320 744,380 716,308" fill="#dfad5c" stroke="#ffffff" stroke-width="2"/><circle cx="780" cy="320" r="68" fill="none" stroke="#17231f" stroke-width="3"/><text x="780" y="420" class-="panel-title" text-anchor="middle" fill="#d99a32">Al</text><text x="870" y="275" class-="small strong" fill="#17231f"><tspan x="870" dy="0">grain refinement</tspan><tspan x="870" dy="34">substructure</tspan><tspan x="870" dy="34">recrystallization</tspan></text><line x1="735" y1="462" x2="1095" y2="462" stroke="#cfdad6" stroke-width="2"/><circle cx="780" cy="515" r="45" fill="#ffffff" stroke="#17231f" stroke-width="3"/><polygon points="780,515 739,503 760,475" fill="#dce9ee" stroke="#ffffff" stroke-width="2"/><polygon points="780,515 760,475 815,478" fill="#a8c6d1" stroke="#ffffff" stroke-width="2"/><polygon points="780,515 815,478 821,520" fill="#cbd7a2" stroke="#ffffff" stroke-width="2"/><polygon points="780,515 821,520 800,555" fill="#8eb2c0" stroke="#ffffff" stroke-width="2"/><polygon points="780,515 800,555 744,552" fill="#dce9ee" stroke="#ffffff" stroke-width="2"/><polygon points="780,515 744,552 739,503" fill="#a8c6d1" stroke="#ffffff" stroke-width="2"/><circle cx="780" cy="515" r="45" fill="none" stroke="#17231f" stroke-width="3"/><text x="850" y="525" class-="small strong" fill="#367f9d">Ti: twinning density ↓</text></g>
</svg>
