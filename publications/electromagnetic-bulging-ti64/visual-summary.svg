<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Electromagnetic bulging of Ti-6Al-4V</title>
  <desc id="desc">Experiment and simulation track copper-driver impact, deformation contour, force, velocity, and strain rate during electromagnetic bulging of titanium alloy.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="context-stroke"/>
    </marker>
    <style>
      text { font-family: Arial, "Noto Sans SC", "Microsoft YaHei", sans-serif; letter-spacing: 0; }
      .kicker { font-size: 16px; font-weight: 700; }
      .title { font-size: 29px; font-weight: 750; fill: #17231f; }
      .panel-title { font-size: 18px; font-weight: 700; }
      .label { font-size: 18px; fill: #17231f; }
      .small { font-size: 15px; fill: #60706a; }
      .micro { font-size: 13px; fill: #60706a; }
      .strong { font-weight: 700; }
      .metric { font-size: 27px; font-weight: 750; fill: #174a3a; }
    </style>
  </defs>
  <rect width="1200" height="675" fill="#f4f8f6"/>
  <rect x="26" y="26" width="1148" height="623" rx="8" fill="#ffffff" stroke="#cfdad6" stroke-width="2"/>
  <text x="56" y="62" class-="kicker" fill="#16827c">ROOM-TEMPERATURE HIGH-RATE FORMING</text>
  <text x="56" y="103" class-="title"><tspan x="56" dy="0">Electromagnetic bulging of Ti-6Al-4V</tspan></text>
  <line x1="56" y1="142" x2="1144" y2="142" stroke="#cfdad6" stroke-width="2"/>
  <g transform="translate(0 0)"><rect x="55" y="185" width="580" height="380" fill="#ffffff" stroke="#cfdad6" rx="6" stroke-width="2"/><rect x="55" y="185" width="8" height="380" fill="#367f9d" stroke="#367f9d" rx="4" stroke-width="0"/><text x="81" y="219" class-="panel-title" fill="#367f9d">EXPERIMENT + SIMULATION</text><ellipse cx="345" cy="455" rx="210" ry="62" fill="#c6d4d9" stroke="#17231f" stroke-width="3"/><path d="M 145 430 C 225 220, 465 220, 545 430" fill="#d6b779" stroke="#cc624f" stroke-width="4"/><path d="M 155 438 C 235 245, 455 245, 535 438" fill="none" stroke="#16827c" stroke-width="4" dash="12 8"/><ellipse cx="345" cy="485" rx="175" ry="34" fill="none" stroke="#d99a32" stroke-width="4"/><ellipse cx="345" cy="485" rx="140" ry="30" fill="none" stroke="#d99a32" stroke-width="4"/><ellipse cx="345" cy="485" rx="105" ry="26" fill="none" stroke="#d99a32" stroke-width="4"/><ellipse cx="345" cy="485" rx="70" ry="22" fill="none" stroke="#d99a32" stroke-width="4"/><text x="345" y="535" class-="small strong" text-anchor="middle">copper driver + Ti-6Al-4V</text><rect x="140" y="210" width="170" height="38" fill="#fff3dd" stroke="none" rx="19" stroke-width="0"/><text x="225.0" y="236" class-="small strong" text-anchor="middle" fill="#d99a32">EXPERIMENT</text><rect x="380" y="210" width="170" height="38" fill="#e6f4f1" stroke="none" rx="19" stroke-width="0"/><text x="465.0" y="236" class-="small strong" text-anchor="middle" fill="#16827c">NUMERICAL</text><rect x="670" y="185" width="475" height="380" fill="#ffffff" stroke="#cfdad6" rx="6" stroke-width="2"/><rect x="670" y="185" width="8" height="380" fill="#cc624f" stroke="#cc624f" rx="4" stroke-width="0"/><text x="696" y="219" class-="panel-title" fill="#cc624f">IMPACT SEQUENCE</text><circle cx="740" cy="320" r="50" fill="#ffffff" stroke="#d99a32" stroke-width="5"/><text x="740" y="313" class-="metric" text-anchor="middle" fill="#d99a32">1</text><text x="740" y="348" class-="micro strong" text-anchor="middle" fill="#17231f">EM force</text><circle cx="890" cy="320" r="50" fill="#ffffff" stroke="#cc624f" stroke-width="5"/><text x="890" y="313" class-="metric" text-anchor="middle" fill="#cc624f">2</text><text x="890" y="348" class-="micro strong" text-anchor="middle" fill="#17231f">driver impact</text><circle cx="1040" cy="320" r="50" fill="#ffffff" stroke="#367f9d" stroke-width="5"/><text x="1040" y="313" class-="metric" text-anchor="middle" fill="#367f9d">3</text><text x="1040" y="348" class-="micro strong" text-anchor="middle" fill="#17231f">high-rate bulge</text><line x1="795" y1="320" x2="830" y2="320" stroke="#60706a" stroke-width="4" marker-end="url(#arrow)"/><line x1="945" y1="320" x2="980" y2="320" stroke="#60706a" stroke-width="4" marker-end="url(#arrow)"/><path d="M 730 465 C 800 455, 830 390, 895 405 S 1000 480, 1085 430" fill="none" stroke="#cc624f" stroke-width="5"/><text x="905" y="515" class-="small" text-anchor="middle">force · velocity · strain rate</text></g>
