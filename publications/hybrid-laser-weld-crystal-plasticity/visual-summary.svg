<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Crystal plasticity from nanoscale to welded joint</title>
  <desc id="desc">Micropillar measurements inform crystal-plasticity modeling, which predicts the macroscale yield behavior of an aluminum-alloy fusion zone.</desc>
