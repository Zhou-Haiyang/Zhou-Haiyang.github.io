  <text x="56" y="62" class-="kicker" fill="#16827c">HYBRID LASER WELDING · AL ALLOYS</text>
  <text x="56" y="103" class-="title"><tspan x="56" dy="0">Crystal plasticity from nanoscale to welded joint</tspan></text>
  <line x1="56" y1="142" x2="1144" y2="142" stroke="#cfdad6" stroke-width="2"/>
