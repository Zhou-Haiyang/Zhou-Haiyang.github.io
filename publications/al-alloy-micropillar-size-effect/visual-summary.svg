<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Microstructure versus size in Al alloy pillars</title>
  <desc id="desc">Compression of aluminum-alloy pillars across nano and microscale sizes reveals interacting effects of solutes, orientation, dislocations, and sample size.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="context-stroke"/>
    </marker>
    <style>
      text { font-family: Arial, "Noto Sans SC", "Microsoft YaHei", sans-serif; letter-spacing: 0; }
      .kicker { font-size: 16px; font-weight: 700; }
      .title { font-size: 29px; font-weight: 750; fill: #17231f; }
      .panel-title { font-size: 18px; font-weight: 700; }
      .label { font-size: 18px; fill: #17231f; }
      .small { font-size: 15px; fill: #60706a; }
      .micro { font-size: 13px; fill: #60706a; }
      .strong { font-weight: 700; }
      .metric { font-size: 27px; font-weight: 750; fill: #174a3a; }
    </style>
  </defs>
  <rect width="1200" height="675" fill="#f4f8f6"/>
  <rect x="26" y="26" width="1148" height="623" rx="8" fill="#ffffff" stroke="#cfdad6" stroke-width="2"/>
  <text x="56" y="62" class-="kicker" fill="#16827c">NANO/MICROSCALE MECHANICS</text>
  <text x="56" y="103" class-="title"><tspan x="56" dy="0">Microstructure versus size in Al alloy pillars</tspan></text>
  <line x1="56" y1="142" x2="1144" y2="142" stroke="#cfdad6" stroke-width="2"/>
  <g transform="translate(0 0)"><rect x="55" y="185" width="720" height="380" fill="#ffffff" stroke="#cfdad6" rx="6" stroke-width="2"/><rect x="55" y="185" width="8" height="380" fill="#d99a32" stroke="#d99a32" rx="4" stroke-width="0"/><text x="81" y="219" class-="panel-title" fill="#d99a32">PILLAR COMPRESSION</text><rect x="145" y="255" width="124" height="24" fill="#81939b" stroke="#17231f" rx="2" stroke-width="2"/><rect x="177.24" y="281" width="59.519999999999996" height="150" fill="#d6b779" stroke="#17231f" rx="4" stroke-width="2"/><rect x="145" y="433" width="124" height="24" fill="#81939b" stroke="#17231f" rx="2" stroke-width="2"/><line x1="207.0" y1="230" x2="207.0" y2="250" stroke="#cc624f" stroke-width="5" marker-end="url(#arrow)"/><text x="207.0" y="486" class-="small strong" text-anchor="middle" fill="#d99a32">6.8 μm</text><text x="207.0" y="516" class-="micro" text-anchor="middle">micro</text><rect x="335" y="255" width="86" height="24" fill="#81939b" stroke="#17231f" rx="2" stroke-width="2"/><rect x="357.36" y="281" width="41.28" height="150" fill="#d6b779" stroke="#17231f" rx="4" stroke-width="2"/><rect x="335" y="433" width="86" height="24" fill="#81939b" stroke="#17231f" rx="2" stroke-width="2"/><line x1="378.0" y1="230" x2="378.0" y2="250" stroke="#cc624f" stroke-width="5" marker-end="url(#arrow)"/><text x="378.0" y="486" class-="small strong" text-anchor="middle" fill="#d99a32">3.3 μm</text><text x="378.0" y="516" class-="micro" text-anchor="middle">meso</text><rect x="515" y="255" width="52" height="24" fill="#81939b" stroke="#17231f" rx="2" stroke-width="2"/><rect x="528.52" y="281" width="24.96" height="150" fill="#d6b779" stroke="#17231f" rx="4" stroke-width="2"/><rect x="515" y="433" width="52" height="24" fill="#81939b" stroke="#17231f" rx="2" stroke-width="2"/><line x1="541.0" y1="230" x2="541.0" y2="250" stroke="#cc624f" stroke-width="5" marker-end="url(#arrow)"/><text x="541.0" y="486" class-="small strong" text-anchor="middle" fill="#d99a32">400 nm</text><text x="541.0" y="516" class-="micro" text-anchor="middle">nano</text><line x1="645" y1="485" x2="695" y2="485" stroke="#60706a" stroke-width="3" marker-end="url(#arrow)"/><text x="650" y="525" class-="small strong" fill="#cc624f">size ↓</text><rect x="810" y="185" width="335" height="380" fill="#ffffff" stroke="#cfdad6" rx="6" stroke-width="2"/><rect x="810" y="185" width="8" height="380" fill="#174a3a" stroke="#174a3a" rx="4" stroke-width="0"/><text x="836" y="219" class-="panel-title" fill="#174a3a">COMPETING EFFECTS</text><text x="850" y="260" class-="small strong" fill="#367f9d">Solute</text><text x="850" y="310" class-="small strong" fill="#d99a32">Orientation</text><text x="850" y="360" class-="small strong" fill="#cc624f">Dislocation density</text><text x="850" y="410" class-="small strong" fill="#16827c">Sample size</text><line x1="850" y1="272" x2="1025" y2="272" stroke="#367f9d" stroke-width="8" marker-end="url(#arrow)"/><line x1="850" y1="322" x2="970" y2="322" stroke="#d99a32" stroke-width="8" marker-end="url(#arrow)"/><line x1="850" y1="372" x2="1060" y2="372" stroke="#cc624f" stroke-width="8" marker-end="url(#arrow)"/><line x1="850" y1="422" x2="1000" y2="422" stroke="#16827c" stroke-width="8" marker-end="url(#arrow)"/><rect x="850" y="492" width="250" height="38" fill="#e7f2ed" stroke="none" rx="19" stroke-width="0"/><text x="975.0" y="518" class-="small strong" text-anchor="middle" fill="#174a3a">FLOW STRENGTH</text></g>
