<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Electrode misalignment accelerates degradation</title>
  <desc id="desc">Misaligned electrodes create asymmetric pressure and heat, while displacement peaks provide an in-process signal for electrode degradation and life.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="context-stroke"/>
    </marker>
    <style>
