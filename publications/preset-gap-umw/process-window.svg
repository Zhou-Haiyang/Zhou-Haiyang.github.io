<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">A displacement-centered process window</title>
  <desc id="desc">Three loading regimes compare under-loading at a large gap, a robust intermediate gap, and re-shearing damage at zero gap.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="context-stroke"/>
    </marker>
    <style>
      text { font-family: Arial, "Noto Sans SC", "Microsoft YaHei", sans-serif; letter-spacing: 0; }
      .kicker { font-size: 16px; font-weight: 700; }
      .title { font-size: 29px; font-weight: 750; fill: #17231f; }
      .panel-title { font-size: 18px; font-weight: 700; }
      .label { font-size: 18px; fill: #17231f; }
      .small { font-size: 15px; fill: #60706a; }
      .micro { font-size: 13px; fill: #60706a; }
      .strong { font-weight: 700; }
      .metric { font-size: 27px; font-weight: 750; fill: #174a3a; }
    </style>
  </defs>
  <rect width="1200" height="675" fill="#f4f8f6"/>
  <rect x="26" y="26" width="1148" height="623" rx="8" fill="#ffffff" stroke="#cfdad6" stroke-width="2"/>
  <text x="56" y="62" class-="kicker" fill="#16827c">PROCESS MAP</text>
  <text x="56" y="103" class-="title"><tspan x="56" dy="0">A displacement-centered process window</tspan></text>
  <line x1="56" y1="142" x2="1144" y2="142" stroke="#cfdad6" stroke-width="2"/>
  <g transform="translate(0 0)"><rect x="55" y="190" width="350" height="370" fill="#ffffff" stroke="#d99a32" rx="6" stroke-width="3"/><text x="80" y="230" class-="panel-title" fill="#d99a32">LARGE GAP</text><text x="80" y="260" class-="label strong">Under-loading</text><rect x="120" y="290" width="220" height="48" fill="#81939b" stroke="#17231f" rx="3" stroke-width="2"/><rect x="100" y="370" width="260" height="18" fill="#d99a32" stroke="#17231f" rx="1" stroke-width="2"/><rect x="143" y="388" width="260" height="18" fill="#367f9d" stroke="#17231f" rx="1" stroke-width="2"/><rect x="100" y="472" width="260" height="32" fill="#174a3a" stroke="#17231f" rx="2" stroke-width="2"/><line x1="355" y1="338" x2="355" y2="370" stroke="#d99a32" stroke-width="3"/><text x="385" y="359" class-="micro strong" text-anchor="end" fill="#d99a32">Δh ↑</text><line x1="160" y1="400" x2="300" y2="400" stroke="#d99a32" stroke-width="4" stroke-dasharray="10 9"/><rect x="120" y="516" width="220" height="38" fill="#f4f8f6" stroke="none" rx="19" stroke-width="0"/><text x="230.0" y="542" class-="small strong" text-anchor="middle" fill="#d99a32">Limited activation</text><rect x="425" y="190" width="350" height="370" fill="#ffffff" stroke="#174a3a" rx="6" stroke-width="3"/><text x="450" y="230" class-="panel-title" fill="#174a3a">0.5-0.7 mm</text><text x="450" y="260" class-="label strong">Robust window</text><rect x="490" y="290" width="220" height="48" fill="#81939b" stroke="#17231f" rx="3" stroke-width="2"/><rect x="470" y="370" width="260" height="18" fill="#d99a32" stroke="#17231f" rx="1" stroke-width="2"/><rect x="513" y="388" width="260" height="18" fill="#367f9d" stroke="#17231f" rx="1" stroke-width="2"/><rect x="470" y="472" width="260" height="32" fill="#174a3a" stroke="#17231f" rx="2" stroke-width="2"/><line x1="725" y1="338" x2="725" y2="370" stroke="#174a3a" stroke-width="3"/><text x="755" y="359" class-="micro strong" text-anchor="end" fill="#174a3a">Δh = 0.5-0.7 mm</text><path d="M 517 399 q 22 -12 44 0 t 44 0 t 44 0" fill="none" stroke="#174a3a" stroke-width="5"/><circle cx="600" cy="438" r="17" fill="#174a3a" stroke="#174a3a" stroke-width="2"/><path d="M 591 438 l 7 8 l 13 -18" fill="none" stroke="#ffffff" stroke-width="4"/><rect x="490" y="516" width="220" height="38" fill="#f4f8f6" stroke="none" rx="19" stroke-width="0"/><text x="600.0" y="542" class-="small strong" text-anchor="middle" fill="#174a3a">Bonding-dominant</text><rect x="795" y="190" width="350" height="370" fill="#ffffff" stroke="#cc624f" rx="6" stroke-width="3"/><text x="820" y="230" class-="panel-title" fill="#cc624f">ZERO GAP</text><text x="820" y="260" class-="label strong">Over-processing</text><rect x="860" y="290" width="220" height="48" fill="#81939b" stroke="#17231f" rx="3" stroke-width="2"/><rect x="840" y="370" width="260" height="18" fill="#d99a32" stroke="#17231f" rx="1" stroke-width="2"/><rect x="883" y="388" width="260" height="18" fill="#367f9d" stroke="#17231f" rx="1" stroke-width="2"/><rect x="840" y="472" width="260" height="32" fill="#174a3a" stroke="#17231f" rx="2" stroke-width="2"/><line x1="1095" y1="338" x2="1095" y2="370" stroke="#cc624f" stroke-width="3"/><text x="1125" y="359" class-="micro strong" text-anchor="end" fill="#cc624f">Δh = 0</text><path d="M 900 402 l 28 -18 l 24 29 l 25 -28 l 25 20" fill="none" stroke="#cc624f" stroke-width="5"/><line x1="895" y1="430" x2="1045" y2="430" stroke="#cc624f" stroke-width="4" stroke-dasharray="9 7"/><rect x="860" y="516" width="220" height="38" fill="#f4f8f6" stroke="none" rx="19" stroke-width="0"/><text x="970.0" y="542" class-="small strong" text-anchor="middle" fill="#cc624f">Re-shearing damage</text></g>
</svg>
